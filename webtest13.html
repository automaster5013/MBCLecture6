<html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <title>Input, Password, Check box Tag</title>
</head>

<body>
    <form method="get" action="">
        ID : <input type="text" name="my_id" size="30" maxlength="8" value="이름을 입력하세요!">
        <br>
        PASSWORD : <input type="password" name="my_password" size="20" maxlength="16" value="1234">
        <p></p>
        ● 평소에 선호하는 언어의 종류를 고르시오.<p></p>
        <input type="checkbox" name="cb1" value="C++">C++
        <input type="checkbox" name="cb2" value="JAVA" checked>JAVA
        <input type="checkbox" name="cb3" value="아랍어">아랍어
        <input type="checkbox" name="cb4" value="자바스크립트">자바스크립트
        <input type="checkbox" name="cb5" value="안드로이드">안드로이드
    </form>
</body>

</html>
